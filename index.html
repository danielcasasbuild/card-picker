<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Card Picker</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"></head><body><div class="app"><div class="topbar"><div class="brandmark">CP</div><h1>Card Picker</h1></div><div class="controls"><input id="search" placeholder="Where are you shopping?"><div class="hint">Search a merchant, tap a category, or scroll favorites</div><div class="section-title">CATEGORIES</div><div class="quick"><button class="pill" data-key="groceries">Groceries</button><button class="pill" data-key="dining">Dining</button><button class="pill" data-key="gas">Gas</button><button class="pill" data-key="retail">Retail</button><button class="pill" data-key="travel">Travel</button><button class="pill" data-key="subscriptions">Subscriptions</button></div><div class="section-title">FAVORITES</div><div class="wheel-shell"><div class="wheel-overlay"></div><div id="favorites" class="wheel"></div></div><div class="section-title">PICKS</div><div class="cards"><button class="card" data-card="best"><div class="card-top"><span id="bestTag" class="card-tag">Primary</span></div><div class="card-line"><img id="bestLogo" alt="Card logo"><div class="card-text"><div id="bestName" class="card-name">—</div><div id="bestLabel" class="card-label"></div></div></div><div id="bestReason" class="reason"></div></button><button class="card" data-card="backup"><div class="card-top"><span id="backupTag" class="card-tag">Backup</span></div><div class="card-line"><img id="backupLogo" alt="Card logo"><div class="card-text"><div id="backupName" class="card-name">—</div><div id="backupLabel" class="card-label"></div></div></div><div id="backupReason" class="reason"></div></button></div><div class="section-title">REWARDS ESTIMATE</div><div class="calc"><div class="calc-meta"><span id="calcSelected">—</span><span id="calcRate">—</span></div><input id="calcInput" inputmode="decimal" placeholder="$0"><div id="calcResult" class="calc-result">—</div></div><div class="footer"><span class="ghost-label">Let's get rich and buy our parents homes in the south of france</span></div></div></div><script src="app.js"></script></body></html>
