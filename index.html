<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Card Picker</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"></head><body><div class="app"><div class="topbar"><div class="brandmark">CP</div><h1>Card Picker</h1></div><input id="search" placeholder="Where are you shopping?"><p class="hint">Search a merchant, tap a category, or scroll favorites</p><div class="panel"><div class="section-title">CATEGORIES</div><div class="quick quick-grid"><button data-key="groceries">Groceries</button><button data-key="dining">Dining</button><button data-key="gas">Gas</button><button data-key="retail">Retail</button><button data-key="travel">Travel</button><button data-key="subscriptions">Subscriptions</button></div></div><div class="panel"><div class="section-title">FAVORITES</div><div class="wheel-shell"><div id="favorites"></div></div></div><div class="panel"><div class="section-title">PICKS</div><div class="cards"><button class="card" data-card="best"><div class="card-top"><span class="card-tag">Primary</span><span class="card-reason" id="bestReason"></span></div><div class="card-main"><img id="bestLogo" class="logo"><div class="card-text"><div class="card-name" id="bestName">—</div><div class="card-label" id="bestLabel"></div></div></div></button><button class="card" data-card="backup"><div class="card-top"><span class="card-tag">Backup</span><span class="card-reason" id="backupReason"></span></div><div class="card-main"><img id="backupLogo" class="logo"><div class="card-text"><div class="card-name" id="backupName">—</div><div class="card-label" id="backupLabel"></div></div></div></button></div></div><div class="panel"><div class="section-title">REWARDS ESTIMATE</div><div class="calc"><div class="calc-left"><div class="calc-selected" id="calcSelected">—</div><div class="calc-rate" id="calcRate">—</div></div><div class="calc-right"><input id="calcInput" placeholder="$0"><div class="calc-result" id="calcResult">—</div></div></div></div><div class="footer"><div class="ghost-label">Let's get rich and buy our parents homes in the south of france</div></div></div><script src="app.js"></script></body></html>
