<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Card Picker</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"></head><body><div class="app"><header class="topbar"><div class="brandmark">CP</div><div><h1 class="title">Card Picker</h1><p class="tagline">Search a merchant, tap a category, or scroll favorites</p></div></header><div class="panel"><input id="search" placeholder="Where are you shopping?"></div><div class="panel"><div class="section-title">CATEGORIES</div><div class="quick quick-grid"><button data-key="groceries">Groceries</button><button data-key="restaurants">Dining</button><button data-key="gas">Gas</button><button data-key="retail">Retail</button><button data-key="travel">Travel</button><button data-key="subscriptions">Subscriptions</button></div></div><div class="panel"><div class="section-title">FAVORITES</div><div class="wheel-shell"><div class="wheel-overlay"></div><div id="favorites" class="wheel"></div></div></div><div class="panel picks-panel"><div class="section-title picks-title">PICKS</div><button class="card" data-card="best"><div class="card-top"><span class="card-tag">Primary</span><span id="bestReason" class="card-reason"></span></div><div class="card-main"><img id="bestLogo" class="logo" alt=""><div class="card-text"><div id="bestName" class="card-name">—</div><div id="bestLabel" class="card-label"></div></div></div></button><button class="card" data-card="backup"><div class="card-top"><span class="card-tag">Backup</span><span id="backupReason" class="card-reason"></span></div><div class="card-main"><img id="backupLogo" class="logo" alt=""><div class="card-text"><div id="backupName" class="card-name">—</div><div id="backupLabel" class="card-label"></div></div></div></button></div><div class="panel"><div class="section-title">REWARDS ESTIMATE</div><div class="calc"><div class="calc-row"><div class="calc-selected"><div id="calcSelected" class="calc-card">—</div><div id="calcRate" class="calc-rate">—</div></div><input id="calcInput" placeholder="$0"></div><div class="calc-result" id="calcResult">$0.00</div></div></div><footer class="footer"><div class="ghost-label">Let's get rich and buy our parents homes in the south of france</div></footer></div><script src="app.js"></script></body></html>
