<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Card Picker</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"></head><body><div class="wrap"><header class="topbar"><div class="title-row"><h1>Card Picker</h1></div></header><div class="panel"><input id="search" class="input" placeholder="Where are you shopping?"><div class="hint">Type a retailer or scroll favorites</div></div><div class="panel"><div class="section-title">CATEGORIES</div><div class="quick quick-grid"><button data-key="groceries">Groceries</button><button data-key="restaurants">Dining</button><button data-key="gas">Gas</button><button data-key="retail">Retail</button><button data-key="travel">Travel</button><button data-key="subscriptions">Subscriptions</button></div></div><div class="panel"><div class="section-title">FAVORITES</div><div class="wheel-shell"><div id="favorites" class="wheel"></div><div class="wheel-overlay"></div></div></div><div class="panel picks-panel"><div class="section-title picks-title">PICKS</div><div class="cards"><button class="card" data-card="best"><div class="card-top"><span class="card-tag">Primary</span><span class="card-rate" id="bestLabel">—</span></div><div class="card-main"><img class="logo" id="bestLogo" alt=""><div class="card-text"><div class="card-name" id="bestName">—</div><div class="card-sub" id="bestReason">—</div></div></div></button><button class="card" data-card="backup"><div class="card-top"><span class="card-tag">Backup</span><span class="card-rate" id="backupLabel">—</span></div><div class="card-main"><img class="logo" id="backupLogo" alt=""><div class="card-text"><div class="card-name" id="backupName">—</div><div class="card-sub" id="backupReason">—</div></div></div></button></div></div><div class="panel"><div class="section-title">REWARDS ESTIMATE</div><div class="calc"><div class="calc-grid"><div class="calc-left"><div class="calc-selected" id="calcSelected">—</div><div class="calc-muted" id="calcRate">—</div></div><div class="calc-right"><input id="calcInput" class="input input-money" placeholder="$0"><div class="calc-result" id="calcResult">—</div></div></div></div></div><footer class="footer"><div class="ghost-label">Let's get rich and buy our parents homes in the south of france</div></footer></div><script src="app.js"></script></body></html>
