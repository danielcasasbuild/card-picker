<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Picker</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

  <div class="topbar">
    <div class="brandmark" aria-hidden="true">CP</div>
    <div>
      <div class="title-row">
        <h1>Card Picker</h1>
        <span class="pill">PWA</span>
      </div>
      <p class="subtitle">Phantom-style rewards advisor</p>
    </div>
  </div>

  <div class="search-group">
    <input id="search" placeholder="Where are you shopping?">
    <div class="hint">Type a merchant or tap a category</div>
  </div>

  <div class="quick" aria-label="Quick categories">
    <button data-key="groceries">Groceries</button>
    <button data-key="restaurants">Dining</button>
    <button data-key="gas">Gas</button>
    <button data-key="retail">Retail</button>
    <button data-key="travel">Travel</button>
    <button data-key="subscriptions">Subscriptions</button>
  </div>

  <div class="cards" aria-label="Recommendations">
    <div class="card">
      <h3>Best Card</h3>
      <div class="card-line">
        <img id="bestLogo" src="" alt="Best card logo">
        <div class="card-meta">
          <div class="card-name" id="bestName">—</div>
          <div class="card-tag">Primary</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Backup</h3>
      <div class="card-line">
        <img id="backupLogo" src="" alt="Backup card logo">
        <div class="card-meta">
          <div class="card-name" id="backupName">—</div>
          <div class="card-tag">Secondary</div>
        </div>
      </div>
    </div>
  </div>

  <p id="reason" class="reason">Pick a category or search.</p>

  <footer class="footer">
    <span class="ghost-label">Offline-ready</span>
    <span class="ghost-label">Expandable database</span>
  </footer>

</div>

<script src="app.js"></script>

</body>
</html>
