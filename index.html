<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Picker</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brandmark" aria-hidden="true">CP</div>
    <div>
      <div class="title-row">
        <h1>Card Picker</h1>
        <span class="pill">PWA</span>
      </div>
      <p class="subtitle">Phantom-style rewards advisor</p>
    </div>
  </div>

  <div class="controls">
    <input id="search" placeholder="Where are you shopping?">
    <div class="hint">Tap a category button or scroll your favorites</div>

    <div class="quick">
      <button type="button" data-key="groceries">Groceries</button>
      <button type="button" data-key="restaurants">Dining</button>
      <button type="button" data-key="gas">Gas</button>
      <button type="button" data-key="retail">Retail</button>
      <button type="button" data-key="travel">Travel</button>
      <button type="button" data-key="subscriptions">Subscriptions</button>
    </div>
  </div>

  <div class="wheel-shell">
    <div class="wheel-overlay"></div>
    <div id="favorites" class="wheel"></div>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-top">
        <span class="card-tag" id="bestTag">Primary</span>
        <div class="card-line">
          <img id="bestLogo" alt="No selection">
          <div class="card-name" id="bestName">—</div>
        </div>
      </div>
      <div class="reason" id="reason"></div>
    </div>

    <div class="card">
      <div class="card-top">
        <span class="card-tag" id="backupTag">Backup</span>
        <div class="card-line">
          <img id="backupLogo" alt="No selection">
          <div class="card-name" id="backupName">—</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="ghost-label">Offline + installable</div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
